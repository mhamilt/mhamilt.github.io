<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ " /assets/main.css" | relative_url }}">
  <link rel="shortcut icon" type="image/png" href="/favicon.png?">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>
  <script defer id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script defer src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
  <script defer type="text/javascript" src="/js/dynaType.js"></script>
  <script defer type="text/javascript" src="/js/jquery.teletype.js"></script>
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
  {%- include google-analytics.html -%}
  {%- endif -%}
  {% if site.tags != "" %}
  {% include collecttags.html %}
  {% endif %}
  <style>
    .audio-warning {
      position: fixed;
      bottom: 20px;
      left: 50%;

      max-width: 280px;
      padding: 12px 16px;

      color: #fff;
      font-size: 14px;
      line-height: 1.4;

      border: 3px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;

      z-index: 9999;

      pointer-events: none;

      transition: opacity 0.35s ease, transform 0.35s ease;

    }

    .audio-warning.hidden {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }
  </style>
</head>
